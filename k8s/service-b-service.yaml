apiVersion: v1                   # Core Kubernetes API version for Services
kind: Service                    # Resource type - exposes network access to Pods
metadata:
  name: service-b                # Unique name of this Service
spec:
  selector:
    app: service-b               # Route traffic to Pods with this label
  ports:
    - protocol: TCP              # Protocol type
      port: 3000                 # Port the Service listens on (inside cluster)
      targetPort: 3000           # Port on the Pod (your app's containerPort)
  type: ClusterIP                # Only accessible from inside cluster (default)