apiVersion: apps/v1              # Kubernetes Deployments API version
kind: Deployment                 # Resource type - manages Pods
metadata:
  name: service-a                # Unique name of this Deployment
spec:
  replicas: 1                    # Number of Pod copies to run
  selector:
    matchLabels:
      app: service-a             # Find & manage Pods with this label
  template:                      # Pod template/blueprint
    metadata:
      labels:
        app: service-a           # Label each Pod created from this template
    spec:                        # Pod specification (what runs inside)
      containers:
      - name: service-a          # Container name
        image: service-a:latest  # Docker image to run
        imagePullPolicy: Never   # Use local image only, don't pull from registry
        ports:
        - containerPort: 3001    # Port the app listens on inside container