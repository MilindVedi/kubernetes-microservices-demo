apiVersion: v1                   # Core Kubernetes API version for Services
kind: Service                    # Resource type - exposes network access to Pods
metadata:
  name: service-a                # Unique name of this Service
spec:
  selector:
    app: service-a               # Route traffic to Pods with this label
  ports:
    - protocol: TCP              # Protocol type
      port: 3001                 # Port the Service listens on (inside cluster)
      targetPort: 3001           # Port on the Pod (your app's containerPort)
      nodePort: 30080            # Port on your machine (external access)
  type: NodePort                 # Expose service on node port (accessible from outside)